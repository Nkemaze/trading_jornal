<body class="flex flex-col min-h-screen">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-background dark:bg-background border-b border-outline-variant dark:border-outline-variant flex items-center justify-between px-md h-14">
<div class="flex items-center gap-md">
<button class="text-primary dark:text-primary active:scale-95 transition-transform p-2 hover:bg-surface-container dark:hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface dark:text-on-surface">Trading Journal</h1>
</div>
<button class="text-primary dark:text-primary active:scale-95 transition-transform p-2 hover:bg-surface-container dark:hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<!-- Main Content (Canvas) -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pb-32">
<!-- Empty State Container -->
<div class="max-w-md w-full flex flex-col items-center text-center">
<!-- Hero Illustration (Bento/Card Style) -->
<div class="relative w-full aspect-square max-w-[280px] mb-xl flex items-center justify-center">
<!-- Background ambient glow -->
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full"></div>
<!-- Illustration Frame -->
<div class="relative z-10 w-full h-full border border-outline-variant rounded-[32px] overflow-hidden bg-surface-container-low flex items-center justify-center shadow-xl">
<img class="w-full h-full object-cover" data-alt="A cinematic 3D render of a futuristic minimalist telescope made of dark matte chrome and brushed obsidian, pointing upwards towards a galaxy of glowing financial data points and stock tickers. The lighting is moody and high-contrast, utilizing the primary blue color palette of the trading app, with soft volumetric glows and sharp highlights reflecting off the metallic surfaces. The background is a deep charcoal grey with subtle bokeh patterns, evoking a sense of exploration and mathematical precision in a modern trading dashboard aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCELNEzyHxOmZCEWaGPRz2RbeGuvG6OGdt4ajQCXHRITnfOUn3XmOOH5ozor031pG6UYtTPZqMBbSS1lNCyP0ZgK9krRu9Dan49V6yNtR995H_mxi3b20x7oM85iat-5HGPmVxZFPLzFPJBkwR0x12HfnJOlj3khQW3qJh8nplcQFGjkTDtsOczticQRmwagxc7zj3PmCvx93QFGLtmlm-WMRcvmVTJaO4YWgODRCMAGbTZPEcW6kWxm6gKecy5HuoPhFpA2Hm9PJE"/>
</div>
</div>
<!-- Content -->
<div class="space-y-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">No pairs tracked yet</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[300px] mx-auto">
                    Add your first trading pair to start journaling your market analysis.
                </p>
</div>
<!-- CTA Button -->
<button class="mt-xl h-14 px-xl bg-primary-container hover:opacity-90 active:scale-95 transition-all text-on-primary-container font-headline-sm rounded-full flex items-center gap-base">
<span class="material-symbols-outlined">add</span>
                Add Pair
            </button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-lg pb-safe h-[72px] bg-surface/70 dark:bg-surface/70 backdrop-blur-xl border-t border-outline-variant dark:border-outline-variant">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-primary dark:text-primary font-bold hover:opacity-80 transition-opacity active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined active-nav-icon">home</span>
<span class="font-label-lg text-label-lg mt-1">Home</span>
</a>
<!-- Journal -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">query_stats</span>
<span class="font-label-lg text-label-lg mt-1">Journal</span>
</a>

<span class="font-label-lg text-label-lg mt-1">Alerts</span>
</a>

<span class="material-symbols-outlined">settings</span>
<span class="font-label-lg text-label-lg mt-1">Settings</span>
</a>
</nav>
<!-- Simple JavaScript for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('button, a');
            buttons.forEach(button => {
                button.addEventListener('touchstart', () => {
                    button.classList.add('opacity-70');
                });
                button.addEventListener('touchend', () => {
                    button.classList.remove('opacity-70');
                });
            });
        });
    </script>
