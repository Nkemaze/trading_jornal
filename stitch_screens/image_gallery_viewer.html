<body class="h-screen w-screen flex flex-col font-body-md text-body-md overflow-hidden bg-black">
<!-- Top App Bar -->

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('image-container');
            const viewport = document.getElementById('chart-viewport');
            const topBar = document.getElementById('top-bar');
            const bottomBar = document.getElementById('bottom-bar');
            const pinchOverlay = document.getElementById('pinch-overlay');
            
            let scale = 1;
            let lastScale = 1;
            let uiVisible = true;
            let timeout;

            // Toggle UI on click
            container.addEventListener('click', (e) => {
                if (e.detail === 1) { // Single tap logic
                    uiVisible = !uiVisible;
                    topBar.style.opacity = uiVisible ? '1' : '0';
                    bottomBar.style.opacity = uiVisible ? '1' : '0';
                    topBar.style.pointerEvents = uiVisible ? 'auto' : 'none';
                    bottomBar.style.pointerEvents = uiVisible ? 'auto' : 'none';
                }
            });

            // Simulate Pinch-to-Zoom logic for desktop demo
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY * -0.01;
                scale = Math.min(Math.max(1, scale + delta), 4);
                viewport.style.transform = `scale(${scale})`;
                
                // Show/Hide indicators
                pinchOverlay.style.opacity = '1';
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    pinchOverlay.style.opacity = '0';
                }, 1500);
            }, { passive: false });

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    // Go back logic
                    console.log('Exiting viewer...');
                }
            });

            // Double tap to reset zoom
            let lastTap = 0;
            container.addEventListener('touchstart', (e) => {
                const now = new Date().getTime();
                const timesince = now - lastTap;
                if ((timesince < 300) && (timesince > 0)) {
                    scale = scale === 1 ? 2.5 : 1;
                    viewport.style.transform = `scale(${scale})`;
                    e.preventDefault();
                }
                lastTap = now;
            });

            // Mobile UI auto-hide after inactivity
            const resetTimer = () => {
                if (!uiVisible) return;
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    if (scale > 1) { // Only auto-hide when zoomed in or focused
                        uiVisible = false;
                        topBar.style.opacity = '0';
                        bottomBar.style.opacity = '0';
                    }
                }, 3000);
            };

            container.addEventListener('mousemove', resetTimer);
            resetTimer();
        });
    </script>
